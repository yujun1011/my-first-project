<!DOCTYPE html>
<html>
  <button onclick="login()">Google 로그인</button>

<div id="user"></div>
<head>
<meta charset="UTF-8">
<title>File AI Automation SaaS</title>

<!-- ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #0f0f0f;
  color: white;
  padding: 40px;
}

.box {
  max-width: 700px;
  margin: auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

button {
  background: #4a7cff;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2d5fe0;
}

.small {
  font-size: 12px;
  color: #aaa;
}

hr {
  margin: 20px 0;
}
</style>
</head>

<body>

<div class="box">

<h2>AI File Automation SaaS (MVP)</h2>

<!-- FILE -->
<input type="file" id="files" multiple>

<button onclick="zipFiles()">ZIP 다운로드 (파일 정리)</button>

<hr>

<h3>PDF → 텍스트 추출</h3>
<input type="file" id="pdfFile">
<button onclick="extractPDF()">PDF 분석</button>

<pre id="pdfResult"></pre>

<button onclick="exportExcel()">Excel 다운로드</button>

<hr>

<h3>히스토리</h3>
<div id="history"></div>

</div>

<script>

let selectedFiles = [];
let pdfData = [];

document.getElementById("files").addEventListener("change", e=>{
  selectedFiles = [...e.target.files];
});

function zipFiles(){
  const zip = new JSZip();

  selectedFiles.forEach((file,i)=>{
    const newName = `file_${String(i+1).padStart(3,'0')}.${file.name.split('.').pop()}`;
    zip.file(newName, file);
  });

  zip.generateAsync({type:"blob"}).then(content=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "files.zip";
    a.click();
  });
}

/* =========================
   PDF → TEXT
========================= */

async function extractPDF(){
  const file = document.getElementById("pdfFile").files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(){
    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument(typedarray).promise;

    let text = "";

    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item=>item.str).join(" ") + "\n";
    }

    document.getElementById("pdfResult").innerText = text;

    pdfData = [
      { type:"pdf_text", content:text }
    ];
  }

  reader.readAsArrayBuffer(file);
}

/* =========================
   EXCEL EXPORT
========================= */

function exportExcel(){
  if(pdfData.length === 0) return;

  const ws = XLSX.utils.json_to_sheet(pdfData);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "result");

  XLSX.writeFile(wb, "result.xlsx");
}

/* =========================
   HISTORY (simple)
========================= */

function saveHistory(type){
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.push({
    time: Date.now(),
    type
  });

  localStorage.setItem("history", JSON.stringify(history));
}
function login() {
  alert("로그인 버튼 눌림");
}
</script>

</body>
</html>
