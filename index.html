<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>파일 이름 자동 정리기</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      padding: 40px;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #4a7cff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #2f5fe3;
    }

    .file-list {
      margin-top: 15px;
      font-size: 14px;
      color: #ccc;
    }

    .template-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .template-buttons button {
      flex: 1;
      background: #333;
    }

    .template-buttons button:hover {
      background: #555;
    }

    .pro-box {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #444;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>파일 이름 자동 정리기</h2>

  <input type="file" id="files" multiple>

  <input type="text" id="prefix" placeholder="이름 접두사 (예: character)">

  <div class="template-buttons">
    <button onclick="setTemplate('webtoon')">웹툰</button>
    <button onclick="setTemplate('video')">영상</button>
    <button onclick="setTemplate('3d')">3D</button>
  </div>

  <button onclick="processFiles()">ZIP 다운로드</button>

  <div class="pro-box">
    PRO 기능: 대량 자동 규칙 / PDF 분석 / 템플릿 저장 (준비중)
  </div>

  <div class="file-list" id="list"></div>
</div>

<script>
let selectedFiles = [];

document.getElementById('files').addEventListener('change', function(e){
  selectedFiles = Array.from(e.target.files);

  document.getElementById('list').innerHTML =
    selectedFiles.map((f,i)=>`${f.name} → ${i+1}`).join("<br>");
});

function setTemplate(type) {
  const input = document.getElementById("prefix");

  if(type === "webtoon") input.value = "scene";
  if(type === "video") input.value = "shot";
  if(type === "3d") input.value = "asset";
}

function autoPrefix(name) {
  if(name.includes("IMG")) return "scene";
  if(name.includes("DSC")) return "photo";
  if(name.includes("render")) return "asset";
  return "file";
}

function processFiles() {
  if(selectedFiles.length === 0) return;

  const zip = new JSZip();

  selectedFiles.forEach((file, i) => {

    const prefix = autoPrefix(file.name);

    const newName =
      `${prefix}_${String(i+1).padStart(3,'0')}.${file.name.split('.').pop()}`;

    zip.file(newName, file);
  });

  zip.generateAsync({type:"blob"}).then(function(content) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "renamed_files.zip";
    a.click();
  });
}
</script>

</body>
</html>
