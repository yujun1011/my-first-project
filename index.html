<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OCR PDF → Excel Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 80px auto;
    background: #111827;
    padding: 30px;
    border-radius: 16px;
}

h1 {
    font-size: 22px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
}

input {
    background: #1f2937;
    color: white;
}

button {
    background: #3b82f6;
    color: white;
}

.output {
    margin-top: 20px;
    font-size: 13px;
    color: #93c5fd;
    white-space: pre-wrap;
}
</style>

</head>

<body>

<div class="container">

<h1>OCR PDF → Excel 자동 추출기</h1>

<input type="file" id="files" multiple accept="application/pdf" />

<button onclick="process()">OCR 분석 시작</button>

<div class="output" id="output"></div>

</div>

<script>

async function pdfToImages(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let images = [];

    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport }).promise;

        images.push(canvas.toDataURL("image/png"));
    }

    return images;
}

async function ocrImage(img) {
    const result = await Tesseract.recognize(img, "kor+eng");
    return result.data.text;
}

// 간단 데이터 추출
function parse(text) {
    const name = text.match(/이름[:\s]*([^\s]+)/);
    const date = text.match(/\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}/);
    const money = text.match(/(\d{1,3}(,\d{3})+|\d+)/);

    return {
        name: name ? name[1] : "unknown",
        date: date ? date[0] : "unknown",
        money: money ? money[0] : "unknown"
    };
}

async function process() {

    const files = document.getElementById("files").files;
    if (!files.length) return alert("파일 선택");

    let results = [];

    for (let file of files) {

        document.getElementById("output").innerText =
            "처리중: " + file.name;

        const images = await pdfToImages(file);

        let fullText = "";

        for (let img of images) {
            const text = await ocrImage(img);
            fullText += text + "\n";
        }

        results.push(parse(fullText));
    }

    const ws = XLSX.utils.json_to_sheet(results);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "data");

    XLSX.writeFile(wb, "ocr_result.xlsx");

    document.getElementById("output").innerText =
        "완료: OCR Excel 생성됨";
}

</script>

</body>
</html>
